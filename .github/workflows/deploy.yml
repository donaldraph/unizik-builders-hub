# .github/workflows/deploy.yml
# CI/CD for UNIZIK Builders Hub — app/ (Vite+React) + infra/ (AWS CDK, TypeScript)
#
# Model: main = production. Push/merge to main -> full prod deploy.
#        PR into main      -> validate only (build + cdk diff), never deploys.
#        Other branches    -> nothing runs.
# Auth: GitHub OIDC -> short-lived AWS role (no stored access keys).

name: Deploy UNIZIK Builders Hub

on:
  push:
    branches: [main]          # land on main -> build + deploy prod
  pull_request:
    branches: [main]          # PR into main -> build + cdk diff (NO deploy)
  workflow_dispatch:          # manual "Run workflow" button -> deploy

permissions:
  id-token: write             # mint the OIDC token for AWS
  contents: read              # clone the repo

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  NODE_VERSION: "20"

jobs:
  # ── JOB 1: build the production frontend bundle ───────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      # Bake PROD config into the bundle. Vite only reads VITE_* from .env files
      # (NOT from shell env), so we write .env.production here. .env.local (dev) is
      # gitignored so it is never on the runner; rm is insurance vs the override quirk.
      - name: Write production env
        working-directory: app
        run: |
          rm -f .env.local
          cat > .env.production <<EOF
          VITE_API_URL=${{ vars.VITE_API_URL }}
          VITE_COGNITO_DOMAIN=${{ vars.VITE_COGNITO_DOMAIN }}
          VITE_USER_POOL_CLIENT_ID=${{ vars.VITE_USER_POOL_CLIENT_ID }}
          VITE_USER_POOL_ID=${{ vars.VITE_USER_POOL_ID }}
          VITE_AWS_REGION=${{ vars.VITE_AWS_REGION }}
          VITE_REDIRECT_URI=${{ vars.VITE_REDIRECT_URI }}
          EOF

      - name: Build (vite build -> production mode -> reads .env.production)
        working-directory: app
        run: npm run build

      - name: Upload built bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/dist
          retention-days: 5

  # ── JOB 2: PR validation — preview infra changes, deploy nothing ──────────────
  cdk-diff:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK deps
        working-directory: infra
        run: npm ci

      # Build the encryption-sdk Lambda layer that auth-stack references via
      # Code.fromAsset(layers/encryption-sdk/build). That build/ dir holds wheels
      # and is gitignored, so without this step `cdk diff` fails synth with
      # CannotFindAsset (exactly what broke the PR #6 prod deploy). setup-python
      # guarantees a modern pip on PATH; build.sh downloads platform-targeted
      # wheels (linux/x86_64, py3.12), so the runner's own OS/Python is irrelevant.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build encryption-sdk Lambda layer
        run: bash infra/layers/encryption-sdk/build.sh

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Diff against PROD with Google creds, so the diff is accurate and does not
      # falsely show the Google IdP being removed.
      - name: cdk diff (prod)
        working-directory: infra
        run: >
          npx cdk diff --all
          -c stage=prod
          -c googleClientId=${{ secrets.GOOGLE_CLIENT_ID }}
          -c googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }}
          -c resendApiKey=${{ secrets.RESEND_API_KEY }}

  # ── JOB 3: deploy prod — push to main or manual run only ──────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name != 'pull_request'   # push-to-main or workflow_dispatch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Download built bundle
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: app/dist

      - name: Install CDK deps
        working-directory: infra
        run: npm ci

      # Build the encryption-sdk Lambda layer before deploy (same reason as the
      # cdk-diff job above): auth-stack's Code.fromAsset points at the gitignored
      # build/ wheels dir, so synth fails with CannotFindAsset without this step.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build encryption-sdk Lambda layer
        run: bash infra/layers/encryption-sdk/build.sh

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Deploy all four asbu-prod-* stacks. -c stage=prod selects prod naming;
      # the Google creds keep the Google IdP wired (auth-stack drops it without them);
      # resendApiKey keeps RESEND_API_KEY on AdminVerifyFn (api) + CustomEmailSenderFn
      # (auth) — both drop it without the context, breaking welcome + auth emails.
      - name: cdk deploy (prod)
        working-directory: infra
        run: >
          npx cdk deploy --all --require-approval never
          -c stage=prod
          -c googleClientId=${{ secrets.GOOGLE_CLIENT_ID }}
          -c googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }}
          -c resendApiKey=${{ secrets.RESEND_API_KEY }}

      # CDK creates the app bucket but does NOT upload the SPA (see hosting-stack.ts).
      # Read the bucket/distribution from stack outputs, publish, then bust the cache.
      - name: Publish frontend to S3 + invalidate CloudFront
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name asbu-prod-hosting \
            --query "Stacks[0].Outputs[?OutputKey=='AppBucketName'].OutputValue" --output text)
          DIST=$(aws cloudformation describe-stacks --stack-name asbu-prod-hosting \
            --query "Stacks[0].Outputs[?OutputKey=='AppDistributionId'].OutputValue" --output text)
          aws s3 sync app/dist "s3://$BUCKET" --delete
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*"
